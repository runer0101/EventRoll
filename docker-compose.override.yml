# Overrides para desarrollo local.
# Se aplica automáticamente junto a docker-compose.yml al ejecutar 'docker compose up'.
version: '3.9'

services:
  db:
    ports:
      - "5432:5432"

  backend:
    build:
      target: runner
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/src:ro
    command: node src/server.js

  frontend:
    # En desarrollo solo levantar backend + db, no el frontend (usar 'npm run dev')
    profiles:
      - prod
