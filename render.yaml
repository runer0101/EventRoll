services:
  - type: web
    name: eventroll-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run migrate && npm run migrate:v1.4 && npm run migrate:v1.5 && npm run migrate:v1.6
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Lo pones manualmente en el dashboard de Render
      - key: JWT_SECRET
        sync: false          # Lo pones manualmente en el dashboard de Render
      - key: CORS_ORIGIN
        value: https://runer0101.github.io
      - key: JWT_EXPIRES_IN
        value: 24h
